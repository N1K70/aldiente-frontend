services:
  dev:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
      - "3002:3002"
    environment:
      - VITE_HMR_PORT=3002
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - VITE_BACKEND_URL=${VITE_BACKEND_URL:-http://localhost:3001}
      - VITE_FILES_URL=${VITE_FILES_URL:-http://localhost:3004}
      - VITE_CHAT_URL=${VITE_CHAT_URL:-http://localhost:3005}
    depends_on:
      - backend
      - filesvc
      - chatsvc
    volumes:
      - .:/app
      - /app/node_modules

  postgres:
    image: postgres:17-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-aldiente}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../ALDIENTE/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  chatsvc:
    build:
      context: ../ALDIENTE/chatsvc
      dockerfile: Dockerfile
    container_name: aldiente-chatsvc
    environment:
      PORT: 3000
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-aldiente}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      JWT_SECRET: ${JWT_SECRET:-aldiente_secret_key_for_jwt}
      CHAT_HISTORY_LIMIT: ${CHAT_HISTORY_LIMIT:-200}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3005:3000"
    volumes:
      - ../ALDIENTE/chatsvc:/app
      - chatsvc_node_modules:/app/node_modules
    command: sh -lc "[ -f node_modules/dotenv/package.json ] || npm install; npx nodemon index.js"
    restart: unless-stopped

  backend:
    build:
      context: ../ALDIENTE/backend
      dockerfile: Dockerfile
    container_name: aldiente-backend
    ports:
      - "3001:3000"
    environment:
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-aldiente}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-aldiente_secret_key_for_jwt}
      FILESVC_URL: http://filesvc:3000
      CHAT_SERVICE_URL: http://chatsvc:3000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ../ALDIENTE/backend:/app
      - backend_node_modules:/app/node_modules
    command: sh -c "[ -f node_modules/transbank-sdk/package.json ] || npm install; node migrate-add-categories.js || true; node migrate-add-location.js || true; node migrate-add-rut.js || true; node import-services.js || true; npx nodemon index.js"

  filesvc:
    build:
      context: ../ALDIENTE/filesvc
      dockerfile: Dockerfile
    container_name: aldiente-filesvc
    environment:
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-aldiente_secret_key_for_jwt}
      STORAGE_DIR: /data
    ports:
      - "3004:3000"
    volumes:
      - files_data:/data
    restart: unless-stopped

#  frontend-prod:
#    build:
#      context: .
#      target: prod
#    ports:
#      - "8080:80"

volumes:
  postgres_data:
  files_data:
  chatsvc_node_modules:
  backend_node_modules:
